name: Fetch source code
run-name: Fetch source code
on:
  push:
    branches:
      - 'scarthgap'
      - '*-dev'
      - '*-next'
  workflow_dispatch:

jobs:
  Download:
    name: Download
    if: github.repository_owner == 'rcar-community'
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup build envrionment
        uses: ./.github/workflows/setup_build_env

      - name: Restore Yocto downloads cache
        uses: actions/cache@v4
        with:
          path: build/build-sparrow-hawk/downloads
          key: yocto-downloads-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            yocto-downloads-${{ runner.os }}-

      - name: Restore Yocto sstate cache
        uses: actions/cache@v4
        with:
          path: build/build-sparrow-hawk/sstate-cache
          key: yocto-sstate-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            yocto-sstate-${{ runner.os }}-

      - name: Run build
        shell: bash
        run: |
          ./build.sh --weston --sbom --rm-work --fetchall
          # Remove large files for Github cache limit(<10GB)
          rm -rf build/build-sparrow-hawk/downloads/git2/*opencv*

