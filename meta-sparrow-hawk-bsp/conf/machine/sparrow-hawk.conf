#@TYPE: Machine
#@NAME: Sparrow hawk machine
#@DESCRIPTION: Machine configuration for running sparrow-hawk

SOC_FAMILY = "r8a779g3"
SOC_FAMILY =. "rcar-gen4:"

require conf/machine/include/soc-family.inc

MACHINE_FEATURES = ""
# Add variable to Build Configuration in build log
BUILDCFG_VARS:append = " SOC_FAMILY"

# Configuration for kernel
PREFERRED_PROVIDER_virtual/kernel ?= "linux-renesas"
KERNEL_IMAGETYPE = "Image"
IMAGE_FSTYPES += " tar.bz2 ext4 wic.gz wic.bmap"
# Device tree
KERNEL_DEVICETREE = "\
    renesas/r8a779g3-sparrow-hawk.dtb \
"
SERIAL_CONSOLES = "921600;ttySC0"

# Configuration for ARM Trusted Firmware
EXTRA_IMAGEDEPENDS += " arm-trusted-firmware"

# u-boot
EXTRA_IMAGEDEPENDS += " u-boot"
# u-boot configure
UBOOT_MACHINE = "r8a779g3_sparrowhawk_defconfig"

# libcamera
PREFERRED_VERSION_libcamera = "v0.6.0+upstream+git"

# ipl burning tool
EXTRA_IMAGEDEPENDS += " ipl-burning"

WKS_FILE ?= "rcar-singlepart-noloader.wks"

PREFERRED_PROVIDER_virtual/egl = "gles-user-module"
PREFERRED_PROVIDER_virtual/libgles1 = "gles-user-module"
PREFERRED_PROVIDER_virtual/libgles2 = "gles-user-module"
PREFERRED_PROVIDER_virtual/libgles3 = "gles-user-module"
PREFERRED_PROVIDER_virtual/libgbm = "libgbm"
PACKAGECONFIG:remove:pn-mesa = "egl gles gbm"

DEFAULTTUNE ?= "cortexa76"
require conf/machine/include/arm/armv8-2a/tune-cortexa76.inc

MACHINE_EXTRA_RRECOMMENDS = " \
    kernel-devicetree kernel-modules \
    sparrow-hawk-fw u-boot \
"
