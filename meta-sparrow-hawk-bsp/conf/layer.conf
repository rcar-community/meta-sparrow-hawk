# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "sparrow-hawk-bsp"
BBFILE_PATTERN_sparrow-hawk-bsp = "^${LAYERDIR}/"
BBFILE_PRIORITY_sparrow-hawk-bsp = "6"
LAYERSERIES_COMPAT_sparrow-hawk-bsp = "scarthgap"
LAYERDEPENDS_sparrow-hawk-bsp = "core openembedded-layer meta-python"
